name: Validate Pack
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate all JSON files
        run: |
          find color_fields -name "*.json" | while read f; do
            if python3 -m json.tool "$f" > /dev/null 2>&1; then echo "  ✓ $f"
            else echo "  ✗ $f (INVALID JSON)" && exit 1; fi
          done
          echo "All JSON valid"
